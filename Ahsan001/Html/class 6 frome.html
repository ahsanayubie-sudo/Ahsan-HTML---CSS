<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Registration Form</title>
</head>
<body>

  <h2>User Registration Form</h2>

  <form action="#" method="post" enctype="multipart/form-data">

    <!-- Name Section -->
    <label for="firstname">First Name:</label>
    <input type="text" id="firstname" name="firstname" placeholder="First Name"><br><br>

    <label for="lastname">Last Name:</label>
    <input type="text" id="lastname" name="lastname"><br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password"><br><br>

    <label for="bio">Bio:</label><br>
    <textarea id="bio" name="bio" rows="4" cols="50"></textarea><br><br>
    <!-----shdgfikyuaweg78irtklsdgflkshdg i lSJEFKhgakjrghoiewfrtkuwheflkjawhi-->
    \
    
    <!-- Gender Section -->
    <fieldset>
      <legend>Gender:</legend>
      <input type="radio" id="male" name="gender" value="male">
      <label for="male">Male</label><br>

      <input type="radio" id="female" name="gender" value="female">
      <label for="female">Female</label><br>

      <input type="radio" id="other" name="gender" value="other">
      <label for="other">Other</label>
    </fieldset>
    <br>

    <!-- Interests Section -->
    <fieldset>
      <legend>Interests:</legend>
      <input type="checkbox" id="music" name="interests" value="music">
      <label for="music">Music</label><br>

      <input type="checkbox" id="sports" name="interests" value="sports">
      <label for="sports">Sports</label><br>

      <input type="checkbox" id="reading" name="interests" value="reading">
      <label for="reading">Reading</label>
    </fieldset>
    <br>

    <!-- Country Dropdown -->
    <label for="country">Country:</label>
    <select id="country" name="country">
      <option value="usa">United States</option>
      <option value="uk">United Kingdom</option>
      <option value="canada">Canada</option>
      <option value="australia">Australia</option>
      <option value="india">India</option>
    </select><br><br>

    <!-- Preferred Colors (Multiple Select) -->
    <label for="colors">Preferred Colors:</label><br>
    <select id="colors" name="colors" multiple size="4">
      <option value="red">Red</option>
      <option value="blue">Blue</option>
      <option value="green">Green</option>
      <option value="yellow">Yellow</option>
    </select><br><br>

    <!-- Profile Picture Upload -->
    <label for="profilepic">Profile Picture:</label>
    <input type="file" id="profilepic" name="profilepic"><br><br>

    <!-- Birthdate -->
    <label for="birthdate">Birthdate:</label>
    <input type="date" id="birthdate" name="birthdate"><br><br>

    <!-- Contact Info -->
    <label for="email">Email:</label>
    <input type="email" id="email" name="email"><br><br>

    <label for="website">Website:</label>
    <input type="url" id="website" name="website"><br><br>

    <label for="search">Search:</label>
    <input type="search" id="search" name="search"><br><br>

    <!-- Submit Button -->
    <input type="submit" value="Submit">

  </form>

</body>
</html>
