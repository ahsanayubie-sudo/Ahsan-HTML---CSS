<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Booking Form</title>
</head>
<body>
  <h1>Plan Your Dream Trip!</h1>
  <p>Fill out the form below to book your next unforgettable adventure.</p>

  <form action="#" method="post" enctype="multipart/form-data">
    
    <!-- Traveler Information -->
    <fieldset>
      <legend>🧍 Traveler Information</legend>

      <label for="fullname">Full Name:</label><br>
      <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required><br><br>

      <label for="email">Email Address:</label><br>
      <input type="email" id="email" name="email" placeholder="example@email.com" required><br><br>

      <label for="phone">Phone Number:</label><br>
      <input type="tel" id="phone" name="phone" placeholder="+1 234 567 890" required><br><br>

      <label for="password">Create Password:</label><br>
      <input type="password" id="password" name="password" placeholder="Enter a secure password" required><br><br>

      <span>Gender:</span><br>
      <input type="radio" id="male" name="gender" value="male" required>
      <label for="male">Male</label>
      <input type="radio" id="female" name="gender" value="female">
      <label for="female">Female</label>
      <input type="radio" id="other" name="gender" value="other">
      <label for="other">Other</label><br><br>

      <label for="dob">Date of Birth:</label><br>
      <input type="date" id="dob" name="dob" required><br>
    </fieldset>

    <br>

    <!-- Trip Details -->
    <fieldset>
      <legend>🌍 Trip Details</legend>

      <label for="destination">Destination:</label><br>
      <select id="destination" name="destination" required>
        <option value="">-- Select Country --</option>
        <option value="japan">Japan</option>
        <option value="italy">Italy</option>
        <option value="australia">Australia</option>
        <option value="usa">United States</option>
        <option value="brazil">Brazil</option>
      </select><br><br>

      <label for="startdate">Travel Start Date:</label><br>
      <input type="date" id="startdate" name="startdate" required><br><br>

      <label for="returndate">Return Date:</label><br>
      <input type="date" id="returndate" name="returndate" required><br><br>

      <label for="traveltime">Preferred Travel Time:</label><br>
      <input type="time" id="traveltime" name="traveltime"><br><br>

      <label for="travelers">Number of Travelers:</label><br>
      <input type="number" id="travelers" name="travelers" min="1" max="10" value="1" required><br><br>

      <label for="budget">Budget Range:</label><br>
      <input type="range" id="budget" name="budget" min="500" max="10000" step="500">
      <span>(Select your approximate budget)</span><br>
    </fieldset>

    <br>

    <!-- Preferences -->
    <fieldset>
      <legend>🧳 Preferences</legend>

      <span>Travel Type:</span><br>
      <input type="checkbox" id="adventure" name="traveltype" value="adventure">
      <label for="adventure">Adventure</label>
      <input type="checkbox" id="relaxation" name="traveltype" value="relaxation">
      <label for="relaxation">Relaxation</label>
      <input type="checkbox" id="cultural" name="traveltype" value="cultural">
      <label for="cultural">Cultural</label>
      <input type="checkbox" id="family" name="traveltype" value="family">
      <label for="family">Family</label><br><br>

      <label for="airline">Airline Preference:</label><br>
      <input type="search" id="airline" name="airline" placeholder="Search or type airline name"><br><br>

      <label for="idproof">Upload ID Proof:</label><br>
      <input type="file" id="idproof" name="idproof" accept=".jpg,.png,.pdf" required><br><br>

      <label for="themecolor">Pick Theme Color for Trip Page:</label><br>
      <input type="color" id="themecolor" name="themecolor" value="#ff6600"><br><br>


      <label for="colortheme">colortheme</label><br>
      <input type="color" id="colortheme" name="colortheme"><br><br>


      <label for="tripurl">Website to Share Trip Photos:</label><br>
      <input type="url" id="tripurl" name="tripurl" placeholder="https://example.com"><br>
    </fieldset>

    <br>

    <!-- Additional Info -->
    <fieldset>
      <legend>💬 Additional Info</legend>

      <label for="notes">Special Requests or Notes:</label><br>
      <textarea id="notes" name="notes" rows="4" cols="50" placeholder="Write any special requests..."></textarea><br><br>

      <input type="hidden" name="bookingID" value="booking123">
    </fieldset>

    <br>

    <!-- Actions -->
    <fieldset>
      <legend>✅ Actions</legend>
      <input type="reset" value="Reset Form">
      <input type="submit" value="Submit Booking">
    </fieldset>

  </form>
</body>
</html>
